<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PlayList Nika - Background Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Philosopher:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --smooth-ease: cubic-bezier(0.16, 1, 0.3, 1);
            --bouncy-ease: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        html { width: 100%; height: 100%; overflow: hidden; background-color: #050505; overscroll-behavior: none; }
        
        body {
            font-family: 'Poppins', sans-serif; margin: 0; padding: 0; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;
            overflow: hidden; background-color: #050505; color: #ffffff;
        }

        /* --- LOADING PAGE --- */
        #nika-loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #050505;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 1s ease;
        }
        .nika-sun-core {
            width: 50px; height: 50px; background: #ffffff; border-radius: 50%; position: relative; z-index: 2;
            box-shadow: 0 0 20px #ffffff, 0 0 50px rgba(255, 255, 255, 0.4);
            animation: smooth-rhythm 1.6s infinite cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .nika-sun-core::before {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; height: 100%; background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
            border-radius: 50%; animation: smooth-pulse 1.6s infinite cubic-bezier(0.25, 0.8, 0.25, 1); z-index: -1;
        }
        .nika-sun-core.explode {
            animation: none; transition: transform 1s cubic-bezier(0.8, 0, 0.2, 1), opacity 0.8s ease;
            transform: scale(80); opacity: 0; box-shadow: 0 0 100px #fff;
        }
        .nika-sun-core.explode::before { display: none; }
        .loader-text {
            margin-top: 60px; color: #ffffff; font-weight: 700; font-size: 1.4em; letter-spacing: 8px;
            font-family: 'Cinzel', serif; text-transform: uppercase; position: relative; z-index: 2;
            animation: smooth-text-breathe 1.6s infinite alternate var(--smooth-ease);
        }

        @keyframes smooth-rhythm {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px #fff, 0 0 40px rgba(255,255,255,0.2); }
            15% { transform: scale(1.3); box-shadow: 0 0 40px #fff, 0 0 80px rgba(255,255,255,0.5); } 
            25% { transform: scale(1); }
            35% { transform: scale(1.8); box-shadow: 0 0 60px #fff, 0 0 120px rgba(255,255,255,0.8); } 
            60% { transform: scale(1); box-shadow: 0 0 20px #fff, 0 0 40px rgba(255,255,255,0.2); }
        }
        @keyframes smooth-pulse {
            0%, 25% { width: 100%; height: 100%; opacity: 0.8; }
            35% { width: 350%; height: 350%; opacity: 0.5; }
            100% { width: 400%; height: 400%; opacity: 0; }
        }
        @keyframes smooth-text-breathe {
            0% { opacity: 0.5; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
            100% { opacity: 1; text-shadow: 0 0 20px rgba(255,255,255,0.8); }
        }
        #nika-loader.hidden { pointer-events: none; opacity: 0; transition: opacity 0.8s ease 0.2s; }

        /* --- BACKGROUND BLOBS --- */
        /* --- BACKGROUND BLOBS (EFEK 3D) --- */
        .blob {
            position: absolute; 
            border-radius: 50%; 
            filter: blur(15px); 
            z-index: 1; 
            opacity: 0.95;
            /* Tambahkan box-shadow inset ini untuk efek 3D */
            box-shadow: inset -30px -30px 40px rgba(0,0,0,0.6), inset 10px 10px 20px rgba(255,255,255,0.8);
            transition: transform 0.1s ease-out; 
            animation: drift 10s infinite alternate linear;
        }
        .blob-1 { width: 40vh; height: 40vh; min-width: 300px; min-height: 300px; background: linear-gradient(135deg, #ffffff, #333333); top: -10%; left: -10%; }
        .blob-2 { width: 35vh; height: 35vh; min-width: 250px; min-height: 250px; background: linear-gradient(135deg, #666666, #111111); bottom: -10%; right: -10%; animation-delay: -5s; }
        
        @keyframes drift {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(20px) scale(1.1); }
        }

        /* --- MAIN PLAYER --- */
        #playerWrapper { display: none; opacity: 0; z-index: 10; width: 100%; height: 100%; justify-content: center; align-items: center; }
        #playerWrapper.visible { display: flex; }

        .glass-card {
            position: relative; width: 90%; max-width: 380px; 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-bottom: 1px solid rgba(255, 255, 255, 0.02); border-right: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 28px; padding: 25px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9); text-align: center;
            transform: translateY(30px) scale(0.98); transition: all 1.2s var(--smooth-ease); box-sizing: border-box; 
        }
        #playerWrapper.visible .glass-card.show { opacity: 1; transform: translateY(0) scale(1); }

        h2 { 
            margin: 0 0 15px 0; font-family: 'Philosopher', sans-serif; font-weight: 700; font-size: 2.2em; 
            letter-spacing: 1px; color: #ffffff; animation: breathe-glow 4s infinite alternate var(--smooth-ease); 
        }
        @keyframes breathe-glow { 0% { text-shadow: 0 0 5px rgba(255,255,255,0.1); } 100% { text-shadow: 0 0 15px rgba(255,255,255,0.6), 0 0 25px rgba(255,255,255,0.2); } }

        .custom-file-upload {
            display: inline-block; padding: 10px 20px; cursor: pointer; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 50px; font-size: 0.85em; font-weight: 600;
            color: #fff; margin-bottom: 25px; width: 80%; transition: all 0.4s var(--smooth-ease); box-sizing: border-box; -webkit-user-select: none; user-select: none;
        }
        @media (hover: hover) { .custom-file-upload:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.5); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2), 0 0 15px rgba(255,255,255,0.1); } }
        .custom-file-upload:active { transform: translateY(1px) scale(0.97); }
        input[type="file"] { display: none; }

        .status { 
            font-size: 0.85em; font-weight: 300; color: rgba(255, 255, 255, 0.5); margin-bottom: 20px; transition: color 0.4s var(--smooth-ease); 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; display: block; box-sizing: border-box; padding: 0 10px;
        }

        .progress-container { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 20px; font-size: 0.75em; font-weight: 400; color: rgba(255, 255, 255, 0.5); }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(255, 255, 255, 0.15); border-radius: 5px; outline: none; cursor: pointer; transition: background 0.4s var(--smooth-ease); }
        @media (hover: hover) { input[type="range"]:hover { background: rgba(255, 255, 255, 0.3); } }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #fff; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); cursor: pointer; transition: transform 0.3s var(--bouncy-ease), box-shadow 0.3s var(--smooth-ease); }
        @media (hover: hover) { input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.6); box-shadow: 0 0 15px rgba(255, 255, 255, 0.8); } }

        .controls-main { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 15px; }
        
        .controls-sub { 
            display: flex; justify-content: center; align-items: center; gap: 8px; 
            margin-bottom: 15px; flex-wrap: wrap; 
        }
        
        button { 
            border: none; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white; border-radius: 50px; cursor: pointer; display: flex; justify-content: center; align-items: center; 
            transition: all 0.4s var(--smooth-ease); -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; 
        }
        @media (hover: hover) { button:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-3px); border-color: rgba(255, 255, 255, 0.3); box-shadow: 0 5px 15px rgba(0,0,0,0.2); } }
        button:active { transform: translateY(1px) scale(0.92); transition: all 0.1; }
        
        #playBtn, #pauseBtn { padding: 12px 24px; font-size: 1.3em; background: #ffffff; color: #000000; font-weight: bold; box-shadow: 0 5px 15px rgba(255,255,255,0.1); }
        @media (hover: hover) { #playBtn:hover, #pauseBtn:hover { background: #e0e0e0; transform: translateY(-4px) scale(1.05); box-shadow: 0 15px 25px rgba(255, 255, 255, 0.25); } }
        
        .sub-btn { padding: 8px 12px; font-size: 0.7em; font-weight: 600;}
        .sub-btn.active { background: rgba(255, 255, 255, 0.2); border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.2); }

        /* --- CONTENT AREA --- */
        .content-area {
            background: rgba(0, 0, 0, 0.15); border-radius: 16px; height: 160px; position: relative;
            border: 1px solid rgba(255, 255, 255, 0.03); padding: 5px; overflow: hidden;
        }

        .playlist-container, .lyrics-container {
            width: 100%; height: 100%; overflow-y: auto; text-align: left; -webkit-overflow-scrolling: touch;
            transition: opacity 0.4s var(--smooth-ease), transform 0.4s var(--smooth-ease);
            position: absolute; top: 0; left: 0; padding: 5px; box-sizing: border-box;
        }

        .lyrics-container { opacity: 0; transform: translateX(20px); pointer-events: none; }
        .content-area.show-lyrics .playlist-container { opacity: 0; transform: translateX(-20px); pointer-events: none; }
        .content-area.show-lyrics .lyrics-container { opacity: 1; transform: translateX(0); pointer-events: auto; }

        /* --- PLAYLIST STYLES --- */
        .playlist-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; border-radius: 10px; margin-bottom: 2px; cursor: pointer; font-size: 0.8em; font-weight: 400; 
            color: rgba(255, 255, 255, 0.5); 
            transition: all 0.3s var(--smooth-ease); opacity: 0; transform: translateY(15px); animation: slideUpFade 0.5s var(--smooth-ease) forwards; 
            -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }
        @media (hover: hover) { .playlist-item:hover { background: rgba(255, 255, 255, 0.08); padding-left: 20px; color: #fff; } }
        .playlist-item.playing { color: #000; font-weight: 600; background: #fff; }

        .delete-btn {
            font-size: 1.2em;
            color: rgba(255, 255, 255, 0.2);
            padding: 0 5px;
            transition: all 0.3s;
            margin-left: 10px;
        }
        .delete-btn:hover { color: #ff4d4d; transform: scale(1.2); }
        .playlist-item.playing .delete-btn { color: rgba(0, 0, 0, 0.3); }
        .playlist-item.playing .delete-btn:hover { color: #ff0000; }
        
        /* --- LYRICS STYLES --- */
        #lyricsEditor {
            width: 100%; height: 100%; background: transparent; border: none; outline: none; resize: none;
            color: #fff; font-family: 'Poppins', sans-serif; font-size: 0.85em; text-align: center;
            line-height: 1.8; font-weight: 400; padding: 10px; box-sizing: border-box;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        #lyricsEditor::placeholder { color: rgba(255,255,255,0.3); font-style: italic; }

        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; } ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body>

<div id="nika-loader">
    <div class="nika-sun-core" id="nikaCore"></div>
    <div class="loader-text" id="loaderText">AWAKENING...</div>
</div>

<div class="blob blob-1" id="blob1"></div>
<div class="blob blob-2" id="blob2"></div>

<div id="playerWrapper">
    <div class="glass-card" id="playerCard">
        <h2>PlayList Nika</h2>
        
        <label class="custom-file-upload">
            <input type="file" id="audioUpload" accept=".mp3, .mp4, audio/mp3, video/mp4" multiple>
            + Update Playlist
        </label>
        
        <audio id="myAudio" preload="metadata"></audio>
        
        <div class="status" id="statusText" title="Sistem siap. Pilih lagu Anda.">Sistem siap.</div>

        <div class="progress-container">
            <span id="currentTime">0:00</span>
            <input type="range" id="progressBar" value="0" step="1" min="0" max="100">
            <span id="durationTime">0:00</span>
        </div>

        <div class="controls-main">
            <button id="prevBtn" class="sub-btn">⏮</button>
            <button id="playBtn">▶</button>
            <button id="pauseBtn" style="display:none;">⏸</button>
            <button id="nextBtn" class="sub-btn">⏭</button>
        </div>
        
        <div class="controls-sub">
            <button id="loopBtn" class="sub-btn">🔁 Loop</button>
            <button id="shuffleBtn" class="sub-btn">🔀 Shuffle</button>
            <button id="toggleLyricsBtn" class="sub-btn" style="border-color: #fff; background: rgba(255,255,255,0.1);">📝 Lirik</button>
        </div>

        <div class="content-area" id="contentArea">
            <div class="playlist-container" id="playlist">
                <div class="playlist-item" style="text-align:center; color:rgba(255,255,255,0.3); cursor:default; animation-delay: 0s;">
                    Playlist kosong
                </div>
            </div>
            
            <div class="lyrics-container">
                <textarea id="lyricsEditor" placeholder="Tempelkan (Paste) lirik lagu di sini...&#10;&#10;Lirik akan otomatis tersimpan untuk lagu ini!"></textarea>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 1. DB UNTUK LAGU (File) ---
    let db;
    const request = indexedDB.open("NikaMusicDB", 1);
    request.onupgradeneeded = (event) => { db = event.target.result; db.createObjectStore("songs", { keyPath: "name" }); };
    request.onsuccess = (event) => { db = event.target.result; loadPlaylistFromDB(); };
    function savePlaylistToDB(filesArray) {
        const transaction = db.transaction(["songs"], "readwrite");
        const store = transaction.objectStore("songs");
        store.clear().onsuccess = () => {
            filesArray.forEach(file => store.put({ name: file.name, data: file }));
        };
    }
    function loadPlaylistFromDB() {
        const transaction = db.transaction(["songs"], "readonly");
        const store = transaction.objectStore("songs");
        const req = store.getAll();
        req.onsuccess = (event) => {
            const results = event.target.result;
            if (results && results.length > 0) {
                songFiles = results.map(item => item.data);
                renderPlaylistUI();
                statusText.innerText = "Lagu dipulihkan 🔄 Klik lagu untuk putar.";
            }
        };
    }

    // --- LOGIKA INTRO ---
    window.addEventListener('load', () => {
        const loader = document.getElementById('nika-loader');
        const nikaCore = document.getElementById('nikaCore');
        const loaderText = document.getElementById('loaderText');
        const playerWrapper = document.getElementById('playerWrapper');
        const card = document.getElementById('playerCard');
        
        setTimeout(() => {
            loaderText.style.opacity = '0'; loaderText.style.transition = 'opacity 0.5s ease';
            nikaCore.classList.add('explode');
            setTimeout(() => {
                loader.classList.add('hidden');
                playerWrapper.style.display = 'flex'; void playerWrapper.offsetWidth; playerWrapper.classList.add('visible');
                setTimeout(() => { playerWrapper.style.opacity = '1'; card.classList.add('show'); }, 50); 
            }, 800); 
        }, 3200); 
    });

    // --- VARIABEL PEMUTAR ---
    const audio = document.getElementById('myAudio');
    const upload = document.getElementById('audioUpload');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const loopBtn = document.getElementById('loopBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const toggleLyricsBtn = document.getElementById('toggleLyricsBtn');
    const statusText = document.getElementById('statusText');
    const playlistContainer = document.getElementById('playlist');
    const contentArea = document.getElementById('contentArea');
    const lyricsEditor = document.getElementById('lyricsEditor');
    const progressBar = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');
    const durationTimeEl = document.getElementById('durationTime');

    let songFiles = [];
    let currentSongIndex = -1;
    let isShuffle = false;
    let isLyricsMode = false;
    audio.loop = false; 

    // --- MENGHAPUS VISUALIZER AGAR BISA JALAN DI LATAR BELAKANG ---
    // (Kode Canvas Visualizer dan AudioContext telah dihapus seluruhnya)

    // --- FUNGSI MEDIA SESSION AGAR MUNCUL DI LOCK SCREEN ---
    function updateMediaSession(songName) {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: songName,
                artist: 'PlayList Nika',
                // Gambar dummy dibutuhkan agar widget tidak blank di HP
                artwork: [{ src: 'https://via.placeholder.com/512/000000/FFFFFF?text=NIKA', sizes: '512x512', type: 'image/png' }]
            });
            // Memberi tahu HP bahwa ini adalah pemutar musik aktif
            navigator.mediaSession.playbackState = "playing";

            navigator.mediaSession.setActionHandler('play', () => audio.play());
            navigator.mediaSession.setActionHandler('pause', () => audio.pause());
            navigator.mediaSession.setActionHandler('nexttrack', () => playNextSong());
            navigator.mediaSession.setActionHandler('previoustrack', () => playPrev());
        }
    }

    // --- FUNGSI PEMUTAR & LIRIK ---
    function cleanFileName(filename) { return filename.replace(/\.(mp3|mp4)$/i, ''); }
    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const min = Math.floor(seconds / 60); const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    function loadLyricsForCurrentSong() {
        if(currentSongIndex === -1) return;
        let songName = cleanFileName(songFiles[currentSongIndex].name);
        let savedLyrics = localStorage.getItem('lyrics_' + songName);
        lyricsEditor.value = savedLyrics || "";
    }

    lyricsEditor.addEventListener('input', () => {
        if(currentSongIndex !== -1) {
            let songName = cleanFileName(songFiles[currentSongIndex].name);
            localStorage.setItem('lyrics_' + songName, lyricsEditor.value);
        }
    });

    toggleLyricsBtn.addEventListener('click', () => {
        isLyricsMode = !isLyricsMode;
        if(isLyricsMode) {
            contentArea.classList.add('show-lyrics');
            toggleLyricsBtn.classList.add('active');
            toggleLyricsBtn.innerText = "🎵 Playlist";
        } else {
            contentArea.classList.remove('show-lyrics');
            toggleLyricsBtn.classList.remove('active');
            toggleLyricsBtn.innerText = "📝 Lirik";
        }
    });

    audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
            progressBar.value = (audio.currentTime / audio.duration) * 100;
            currentTimeEl.innerText = formatTime(audio.currentTime);
        }
    });

    audio.addEventListener('loadedmetadata', () => { durationTimeEl.innerText = formatTime(audio.duration); });
    progressBar.addEventListener('input', () => { if (audio.duration) audio.currentTime = (progressBar.value / 100) * audio.duration; });

    function renderPlaylistUI() {
        playlistContainer.innerHTML = ""; 
        if (songFiles.length === 0) {
            playlistContainer.innerHTML = '<div class="playlist-item" style="text-align:center; color:rgba(255,255,255,0.3); cursor:default;">Playlist kosong</div>';
            return;
        }
        songFiles.forEach((file, index) => {
            const item = document.createElement('div');
            item.className = 'playlist-item' + (currentSongIndex === index ? ' playing' : ''); 
            
            const nameSpan = document.createElement('span');
            nameSpan.innerText = cleanFileName(file.name);
            nameSpan.style.flex = "1";
            nameSpan.style.overflow = "hidden";
            nameSpan.style.textOverflow = "ellipsis";
            
            const delBtn = document.createElement('span');
            delBtn.innerHTML = "&times;";
            delBtn.className = "delete-btn";
            delBtn.onclick = (e) => {
                e.stopPropagation(); 
                removeSong(index);
            };

            item.onclick = () => playSong(index);
            item.appendChild(nameSpan);
            item.appendChild(delBtn);
            item.style.animationDelay = `${index * 0.05}s`; 
            playlistContainer.appendChild(item);
        });
    }

    function removeSong(index) {
        if (index === currentSongIndex) {
            audio.pause();
            audio.src = "";
            currentSongIndex = -1;
            statusText.innerText = "Lagu dihapus.";
            playBtn.style.display = 'block';
            pauseBtn.style.display = 'none';
        } else if (index < currentSongIndex) {
            currentSongIndex--;
        }
        
        songFiles.splice(index, 1);
        savePlaylistToDB(songFiles); 
        renderPlaylistUI();
    }

    upload.addEventListener('change', function(e) {
        const newFiles = Array.from(e.target.files);
        if (newFiles.length > 0) {
            songFiles = [...songFiles, ...newFiles]; 
            renderPlaylistUI(); 
            savePlaylistToDB(songFiles); 
            statusText.innerText = "Playlist diperbarui.";
            statusText.style.color = "rgba(255,255,255,0.8)";
        }
    });

    function playSong(index) {
        if(songFiles.length === 0) return;

        currentSongIndex = index;
        const file = songFiles[index];
        
        // Memutar langsung dari element audio bawaan HTML5 (Aman dari pembatasan background)
        audio.src = URL.createObjectURL(file);
        
        // Promise untuk memastikan HP meregistrasi ini sebagai pemutaran media
        audio.play().then(() => {
            let songName = cleanFileName(file.name);
            statusText.innerText = "Memutar: " + songName;
            statusText.title = "Memutar: " + songName; 
            statusText.style.color = "#fff";
            
            // Panggil Media Session agar widget muncul di lock screen
            updateMediaSession(songName);
        }).catch((e) => {
            console.log("Play interrupted by browser policy", e);
        });
        
        loadLyricsForCurrentSong();
        playBtn.style.display = 'none';
        pauseBtn.style.display = 'block';
        
        renderPlaylistUI(); 
        
        const items = document.querySelectorAll('.playlist-item');
        if(items[index]) items[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    playBtn.addEventListener('click', () => {
        if (audio.src && audio.src !== window.location.href) { 
            audio.play().then(() => {
                if(currentSongIndex !== -1) updateMediaSession(cleanFileName(songFiles[currentSongIndex].name));
            });
            playBtn.style.display = 'none'; 
            pauseBtn.style.display = 'block'; 
        } else if (songFiles.length > 0) { 
            playSong(isShuffle ? Math.floor(Math.random() * songFiles.length) : 0); 
        }
    });

    pauseBtn.addEventListener('click', () => {
        audio.pause(); 
        playBtn.style.display = 'block'; 
        pauseBtn.style.display = 'none'; 
        statusText.innerText = "Dijeda.";
        if ('mediaSession' in navigator) {
            navigator.mediaSession.playbackState = "paused";
        }
    });

    function playPrev() {
        if(songFiles.length === 0) return;
        let prevIndex = (currentSongIndex - 1 + songFiles.length) % songFiles.length;
        playSong(prevIndex);
    }

    function playNextSong() {
        if(songFiles.length === 0) return;
        let nextIndex;
        if(isShuffle) {
            nextIndex = Math.floor(Math.random() * songFiles.length);
            while(nextIndex === currentSongIndex && songFiles.length > 1) nextIndex = Math.floor(Math.random() * songFiles.length);
        } else {
            nextIndex = (currentSongIndex + 1) % songFiles.length;
        }
        playSong(nextIndex);
    }

    nextBtn.addEventListener('click', playNextSong);
    prevBtn.addEventListener('click', playPrev);

    audio.addEventListener('ended', () => {
        if (audio.loop) { 
            audio.play(); 
        } else { 
            playNextSong(); 
        }
    });

    // Menangani sinkronisasi UI saat lagu ter-pause dari lock screen HP
    audio.addEventListener('pause', () => {
        playBtn.style.display = 'block';
        pauseBtn.style.display = 'none';
    });

    audio.addEventListener('play', () => {
        playBtn.style.display = 'none';
        pauseBtn.style.display = 'block';
    });

    loopBtn.addEventListener('click', () => {
        audio.loop = !audio.loop;
        loopBtn.classList.toggle('active', audio.loop);
        if (audio.loop) { 
            isShuffle = false; shuffleBtn.classList.remove('active');
        }
    });

    shuffleBtn.addEventListener('click', () => {
        isShuffle = !isShuffle;
        shuffleBtn.classList.toggle('active', isShuffle);
        if (isShuffle) { 
            audio.loop = false; loopBtn.classList.remove('active');
        }
    });
</script>

</body>
</html>
