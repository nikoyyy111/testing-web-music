<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gear 5 Music Player</title>
    <style>
        /* Menggunakan font kartun/bold jika tersedia, atau sans-serif standar */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Latar belakang malam hari/awan gelap sebelum awakening */
            background: radial-gradient(circle at center, #2b1055 0%, #0d0628 100%);
            margin: 0;
            color: #333;
            overflow: hidden;
        }

        /* Kotak utama pemutar musik */
        .player-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            /* Bentuk agak membulat organik seperti awan */
            border-radius: 30px;
            /* Pancaran aura Haki Gear 5 */
            box-shadow: 0 0 30px rgba(186, 104, 200, 0.6), 0 0 60px rgba(255, 255, 255, 0.4);
            text-align: center;
            width: 360px;
            position: relative;
            border: 4px solid #fff;
            transition: all 0.3s ease;
        }

        /* Animasi Detak Jantung (Drums of Liberation) */
        @keyframes heartbeat {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(186, 104, 200, 0.6), 0 0 60px rgba(255, 255, 255, 0.4); }
            14% { transform: scale(1.03); box-shadow: 0 0 50px rgba(156, 39, 176, 0.8), 0 0 80px rgba(255, 213, 79, 0.6); }
            28% { transform: scale(1); box-shadow: 0 0 30px rgba(186, 104, 200, 0.6), 0 0 60px rgba(255, 255, 255, 0.4); }
            42% { transform: scale(1.015); box-shadow: 0 0 40px rgba(156, 39, 176, 0.7), 0 0 70px rgba(255, 213, 79, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 30px rgba(186, 104, 200, 0.6), 0 0 60px rgba(255, 255, 255, 0.4); }
        }

        /* Class ini ditambahkan lewat JS saat lagu main */
        .player-card.is-playing {
            animation: heartbeat 1.5s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        h2 {
            margin-top: 0;
            color: #4a148c;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #ffd54f;
        }

        /* Tombol Upload */
        input[type="file"] {
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #666;
            width: 100%;
            font-weight: bold;
        }
        input[type="file"]::file-selector-button {
            background-color: #f3e5f5;
            color: #6a1b9a;
            border: 2px solid #ce93d8;
            padding: 8px 15px;
            border-radius: 15px;
            cursor: pointer;
            margin-right: 10px;
            transition: 0.3s;
            font-weight: bold;
        }
        input[type="file"]::file-selector-button:hover {
            background-color: #e1bee7;
            transform: translateY(-2px);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        /* Tombol Bouncy Gear 5 */
        button {
            padding: 12px 18px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            background-color: #fff;
            color: #4a148c;
            font-weight: 900;
            font-size: 0.9em;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #ce93d8, 0 8px 15px rgba(0,0,0,0.1);
            transition: all 0.1s;
            position: relative;
            overflow: hidden; 
            border: 2px solid #e1bee7;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #ce93d8, 0 10px 20px rgba(0,0,0,0.15);
        }
        button:active { 
            transform: translateY(5px); /* Efek membal saat ditekan */
            box-shadow: 0 0px 0 #ce93d8, 0 2px 5px rgba(0,0,0,0.1);
        }
        
        button.active { 
            background-color: #ffd54f; 
            color: #333; 
            box-shadow: 0 5px 0 #ffb300, 0 8px 15px rgba(0,0,0,0.1);
            border-color: #ffca28;
        }

        .status {
            margin-top: 15px;
            font-size: 0.9em;
            font-weight: bold;
            color: #7b1fa2;
            word-wrap: break-word;
            margin-bottom: 15px;
        }

        /* Daftar Putar (Playlist) Tema Awan */
        .playlist-container {
            background: #fafafa;
            border-radius: 15px;
            max-height: 160px;
            overflow-y: auto;
            text-align: left;
            margin-top: 10px;
            border: 2px dashed #ce93d8;
        }
        
        .playlist-item {
            padding: 12px 15px;
            border-bottom: 1px solid #f3e5f5;
            cursor: pointer;
            font-size: 0.9em;
            color: #555;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            position: relative; 
            font-weight: bold;
        }
        .playlist-item:last-child { border-bottom: none; }
        .playlist-item:hover { background-color: #f3e5f5; padding-left: 20px; }
        
        /* Lagu yang sedang diputar (Mendapat warna emas Matahari) */
        .playlist-item.playing {
            color: #d84315;
            background-color: #fff8e1;
            border-left: 6px solid #ffd54f;
            padding-left: 20px;
        }

        /* --- KODE ANIMASI SENTUH AURA HAKI --- */
        span.ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-effect 0.6s ease-out;
            /* Warna aura ungu transparan */
            background-color: rgba(156, 39, 176, 0.3);
            pointer-events: none;
        }

        @keyframes ripple-effect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Scrollbar kustom agar lebih rapi */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px;}
        ::-webkit-scrollbar-thumb { background: #ce93d8; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ab47bc; }
    </style>
</head>
<body>

<div class="player-card" id="playerCard">
    <h2>☁️ Nika Player 🥁</h2>
    
    <input type="file" id="audioUpload" accept="audio/*" multiple>
    <audio id="myAudio"></audio>
    
    <div class="controls">
        <button id="playBtn" class="ripple-target">▶ Play</button>
        <button id="pauseBtn" class="ripple-target">⏸ Pause</button>
        <button id="loopBtn" class="ripple-target active">🔁 Loop: ON</button>
    </div>
    
    <div class="status" id="statusText">Drums of Liberation siap dibunyikan!</div>

    <div class="playlist-container" id="playlist">
        <div class="playlist-item" style="text-align:center; color:#999; cursor:default;">
            Belum ada lagu.
        </div>
    </div>
</div>

<script>
    const audio = document.getElementById('myAudio');
    const upload = document.getElementById('audioUpload');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const loopBtn = document.getElementById('loopBtn');
    const statusText = document.getElementById('statusText');
    const playlistContainer = document.getElementById('playlist');
    const playerCard = document.getElementById('playerCard'); // Mengambil elemen kotak pemutar

    let songFiles = [];
    audio.loop = true;

    // --- FUNGSI EFEK SENTUH (RIPPLE) ---
    function createRipple(event) {
        const target = event.currentTarget;
        const circle = document.createElement("span");
        const diameter = Math.max(target.clientWidth, target.clientHeight);
        const radius = diameter / 2;

        const rect = target.getBoundingClientRect();
        circle.style.width = circle.style.height = `${diameter}px`;
        circle.style.left = `${event.clientX - rect.left - radius}px`;
        circle.style.top = `${event.clientY - rect.top - radius}px`;
        circle.classList.add("ripple");

        const existingRipple = target.querySelector('.ripple');
        if (existingRipple) {
            existingRipple.remove();
        }

        target.appendChild(circle);
    }

    document.querySelectorAll('.ripple-target').forEach(btn => {
        btn.addEventListener('click', createRipple);
    });

    // --- LOGIKA PEMUTAR MUSIK ---
    upload.addEventListener('change', function(e) {
        songFiles = Array.from(e.target.files);
        
        if (songFiles.length > 0) {
            playlistContainer.innerHTML = ""; 
            
            songFiles.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'playlist-item ripple-target'; 
                item.innerText = (index + 1) + ". " + file.name;
                
                item.addEventListener('click', (e) => {
                    createRipple(e);
                    playSong(index);
                });
                
                playlistContainer.appendChild(item);
            });
            statusText.innerText = "Lagu dimuat. Ketuk untuk memutar!";
        }
    });

    function playSong(index) {
        const file = songFiles[index];
        const url = URL.createObjectURL(file);
        
        audio.src = url;
        audio.play();
        
        statusText.innerText = "🥁 Memutar: " + file.name;
        
        // Aktifkan detak jantung
        playerCard.classList.add('is-playing');

        const items = document.querySelectorAll('.playlist-item');
        items.forEach(el => el.classList.remove('playing'));
        items[index].classList.add('playing');
    }

    playBtn.addEventListener('click', () => {
        if (audio.src) {
            audio.play();
            statusText.innerText = "🥁 Memutar kembali...";
            playerCard.classList.add('is-playing'); // Aktifkan detak jantung
        } else if (songFiles.length > 0) {
            playSong(0);
        } else {
            alert("Harap pilih file lagu terlebih dahulu!");
        }
    });

    pauseBtn.addEventListener('click', () => {
        audio.pause();
        statusText.innerText = "⏸ Musik Berhenti.";
        playerCard.classList.remove('is-playing'); // Matikan detak jantung
    });

    // Matikan detak jantung saat lagu benar-benar selesai (jika loop mati)
    audio.addEventListener('ended', () => {
        if (!audio.loop) {
            playerCard.classList.remove('is-playing');
            statusText.innerText = "Lagu selesai.";
        }
    });

    loopBtn.addEventListener('click', () => {
        audio.loop = !audio.loop;
        
        if (audio.loop) {
            loopBtn.classList.add('active');
            loopBtn.innerText = "🔁 Loop: ON";
        } else {
            loopBtn.classList.remove('active');
            loopBtn.innerText = "🔁 Loop: OFF";
            loopBtn.style.backgroundColor = "#fff";
            loopBtn.style.color = "#4a148c";
            loopBtn.style.boxShadow = "0 5px 0 #ce93d8, 0 8px 15px rgba(0,0,0,0.1)";
            loopBtn.style.borderColor = "#e1bee7";
        }
    });
</script>

</body>
</html>
